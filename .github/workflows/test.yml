name: Test

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install pinned tools
        uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.60.1
          enable_aqua_install: true
          aqua_opts: ""

      - name: Download Go modules
        run: go mod download

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race -count=1 ./...

      - name: Build development binary
        run: |
          go build -trimpath -o "$RUNNER_TEMP/tnnl" .
          test "$("$RUNNER_TEMP/tnnl" version)" = dev

  actions:
    name: Actions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install pinned tools
        uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.60.1
          enable_aqua_install: true
          aqua_opts: ""

      - name: Validate workflows
        run: actionlint

      - name: Validate release configuration
        run: goreleaser check

  docs:
    name: Docs and release scripts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Check product documentation
        run: bash script/check-docs.sh

      - name: Test release artifact verifier
        run: bash script/verify-release-artifacts_test.sh
